<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKYRO V20 | GOD-SHATTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --bg: #000105; --red: #ff003c; --glow: 0 0 50px rgba(0, 242, 255, 0.8); }
        body.nitro { --p: #ff003c; --glow: 0 0 80px rgba(255, 0, 60, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body, html { background: #000; color: var(--p); font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; perspective: 3000px; }

        /* V20 GOD-SHATTER LOADER */
        #loader { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .load-ring { width: 120px; height: 120px; border: 4px solid rgba(0, 242, 255, 0.1); border-top: 4px solid var(--p); border-radius: 50%; animation: spin 0.5s linear infinite; box-shadow: var(--glow); }
        
        #handshake { position: fixed; inset: 0; z-index: 90000; background: #000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .scanner { width: 250px; height: 250px; border: 5px double #0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 1.5s infinite; cursor: pointer; }
        
        #ui-wrapper { position: fixed; inset: 0; z-index: 80000; display: none; opacity: 0; transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .glass { background: rgba(0, 10, 25, 0.85); border: 1px solid rgba(0, 242, 255, 0.3); backdrop-filter: blur(60px); border-radius: 20px; box-shadow: 0 0 100px rgba(0,0,0,1); }

        #container { display: grid; grid-template-columns: 350px 1fr; grid-template-rows: 150px 1fr; height: 100vh; padding: 25px; gap: 25px; }
        header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding: 0 60px; }
        .logo-text { font-size: 3rem; font-weight: 900; letter-spacing: 15px; text-shadow: var(--glow); animation: shake 5s infinite; }

        /* SPEED HUD */
        #speedo-wrap { padding: 40px; text-align: center; border-bottom: 1px solid rgba(0,242,255,0.2); }
        .gauge-val { font-size: 4rem; font-weight: 900; text-shadow: var(--glow); }

        /* EXTREME CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 30px; transform-style: preserve-3d; }
        .card { padding: 50px; text-align: center; transition: 0.4s; transform-style: preserve-3d; background: rgba(0, 242, 255, 0.05); border: 2px solid rgba(0, 242, 255, 0.2); border-radius: 0 50px; }
        .card:hover { border-color: var(--p); transform: translateZ(150px) rotateX(15deg); box-shadow: var(--glow); background: rgba(0, 242, 255, 0.15); }
        
        .back-btn { position: absolute; top: 35px; left: 35px; padding: 18px 50px; border: 3px solid var(--p); background: #000; color: var(--p); font-weight: 900; text-transform: uppercase; letter-spacing: 5px; box-shadow: var(--glow); z-index: 1000; }
        .open-btn { display: inline-block; padding: 25px 80px; border: 4px solid var(--p); background: transparent; color: var(--p); font-weight: 900; font-size: 1.5rem; letter-spacing: 10px; border-radius: 0 60px; transition: 0.3s; box-shadow: var(--glow); }
        .open-btn:hover { background: var(--p); color: #000; transform: scale(1.1); }

        /* 3D CORE */
        .viewport-3d { width: 500px; height: 500px; transform-style: preserve-3d; position: relative; }
        .reactor-core { width: 100%; height: 100%; border-radius: 50%; border: 15px solid var(--p); animation: hyperSpin 3s linear infinite; box-shadow: var(--glow), inset var(--glow); position: absolute; }
        .reactor-core::after { content: ''; position: absolute; inset: 50px; border: 5px dashed var(--p); border-radius: 50%; animation: spin 1s linear infinite reverse; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes hyperSpin { from { transform: rotateY(0) rotateX(75deg); } to { transform: rotateY(360deg) rotateX(75deg); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px #0f0; transform: scale(1); } 50% { box-shadow: 0 0 100px #0f0; transform: scale(1.05); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 1%, 2% { transform: translateX(-2px); } 3%, 4% { transform: translateX(2px); } }
    </style>
</head>
<body onload="initSystem()">

    <div id="loader">
        <div class="load-ring"></div>
        <div style="margin-top:40px; font-family:'Source Code Pro'; letter-spacing:10px;">GOD-SHATTER PROTOCOL: ACTIVE</div>
    </div>

    <div id="handshake" onclick="boot()">
        <div class="scanner">
            <div style="width:100%; height:5px; background:#0f0; box-shadow:0 0 30px #0f0; position:absolute; top:0; animation:scan 2s infinite ease-in-out;"></div>
        </div>
        <div style="margin-top:40px; color:#0f0; font-size:1.5rem; letter-spacing:10px;">VERIFIED: ARCHITECT SHASWAT</div>
    </div>

    <canvas id="nebula" style="position:fixed; inset:0; z-index:0;"></canvas>

    <div id="ui-wrapper">
        <div id="container">
            <header class="glass">
                <div class="branding">
                    <div class="logo-text">SKYRO | SHASWAT</div>
                    <div style="letter-spacing:10px; opacity:0.8; font-weight:700;">DIGITAL CITADEL EXTREME</div>
                </div>
                <button style="border:2px solid var(--red); color:var(--red); padding:15px 30px; font-weight:900; background:transparent; cursor:pointer;" onclick="toggleNitro()">NITRO BOOST</button>
            </header>
            <aside class="glass">
                <div id="speedo-wrap">
                    <div class="gauge-val" id="speedo">000</div>
                    <div style="letter-spacing:8px; opacity:0.6;">MACH VELOCITY</div>
                </div>
                <div id="terminal" style="flex-grow:1; overflow-y:auto; padding:25px; font-family:'Source Code Pro'; font-size:0.8rem; line-height:2;"></div>
            </aside>
            <main class="glass" id="viewport"></main>
        </div>
    </div>

    <script>
        const nodes = [
            { id: 'mk3', name: 'MARK 3', icon: '🏎️', color: '#ff0000', link: 'https://youtube.com', label: 'YOUTUBE' },
            { id: 'mk4', name: 'MARK 4', icon: '🚀', color: '#00ff66', link: 'https://play.google.com', label: 'PLAY STORE' },
            { id: 'mk5', name: 'MARK 5', icon: '🏁', color: '#ffaa00', link: 'https://www.pubgmobile.com', label: 'PUBG' },
            { id: 'mk50', name: 'MARK 50', icon: '📷', color: '#b300ff', link: 'https://instagram.com', label: 'INSTAGRAM' },
            { id: 'mk85', name: 'MARK 85', icon: '🛒', color: '#ffffff', link: 'https://flipkart.com', label: 'FLIPKART' },
            { id: 'mk1', name: 'MARK 1', icon: '📡', color: '#00f2ff', link: 'http://maps.google.com', label: 'MAPS' },
            { id: 'apex', name: 'APEX', icon: '⚛', color: '#00f2ff', link: '#', label: 'CREATOR' }
        ];

        let active = 'home', isNitro = false, speed = 0, targetSpeed = 0, audioCtx;

        function playSound(freq) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function speak(t) { 
            const u = new SpeechSynthesisUtterance(t); 
            u.pitch = 0.7; u.rate = 1.1; 
            window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); 
        }

        function initSystem() {
            setTimeout(() => { 
                document.getElementById('loader').style.display = 'none';
                document.getElementById('handshake').style.display = 'flex';
                initSpace();
            }, 1000);
        }

        function boot() {
            playSound(400); speak("Welcome, Shaswat. God-Shatter protocol unleashed.");
            document.getElementById('handshake').style.display='none';
            document.getElementById('ui-wrapper').style.display='block';
            setTimeout(()=>document.getElementById('ui-wrapper').style.opacity='1', 100);
            render();
        }

        function toggleNitro() {
            isNitro = !isNitro; document.body.classList.toggle('nitro');
            if(isNitro) { speak("Nitro overclocking active."); playSound(1200); }
        }

        let canvas, ctx, parts = [];
        function initSpace() {
            canvas = document.getElementById('nebula'); ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) parts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, z:Math.random()*canvas.width, l:Math.random()*60});
            animate();
            window.addEventListener('mousemove', (e) => {
                targetSpeed = Math.abs(e.movementX + e.movementY) * 3;
                if(active === 'home') {
                    const g = document.querySelector('.grid');
                    if(g) g.style.transform = `rotateY(${(window.innerWidth/2-e.clientX)/20}deg) rotateX(${-(window.innerHeight/2-e.clientY)/20}deg)`;
                }
            });
        }

        function animate() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            speed += (targetSpeed - speed) * 0.1;
            let m = isNitro ? (speed + 600) : speed;
            document.getElementById('speedo').innerText = Math.floor(m).toString().padStart(3, '0');
            targetSpeed *= 0.96;
            parts.forEach(p => {
                p.z -= (isNitro ? 60 : 15 + speed/4); if(p.z<=0) p.z=canvas.width;
                const sx = (p.x - canvas.width/2) * (canvas.width/p.z) + canvas.width/2;
                const sy = (p.y - canvas.height/2) * (canvas.width/p.z) + canvas.height/2;
                const s = (1 - p.z/canvas.width);
                ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--p');
                ctx.lineWidth = s * 6; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + (s*p.l*(isNitro?20:4)), sy); ctx.stroke();
            }); requestAnimationFrame(animate);
        }

        function log(m) {
            const t = document.getElementById('terminal'), d = document.createElement('div');
            d.innerHTML = `> ${m}`; t.prepend(d);
        }

        function navigate(id) { 
            playSound(800); active = id; render(); 
            if(id === 'apex') speak("Created by Shaswat Mohanty.");
        }

        function render() {
            const v = document.getElementById('viewport');
            log(`STARK_UPLINK: ${active.toUpperCase()}`);
            if(active === 'home') {
                v.innerHTML = `<div class="grid">${nodes.map(n => `<div class="card" onclick="navigate('${n.id}')"><span style="font-size:5rem;display:block;margin-bottom:20px;color:${n.color}">${n.icon}</span><div style="font-size:2rem;font-weight:900;color:${n.color}">${n.name}</div><div style="font-size:0.8rem;opacity:0.6;margin-top:10px;">ACTIVATE_${n.label}</div></div>`).join('')}</div>`;
            } else {
                const n = nodes.find(x => x.id === active);
                speak(`Opening ${n.label} directory.`);
                let content = active === 'apex' ? `<div style="font-size:3rem;font-weight:900;text-align:center;">ARCHITECT<br>SHASWAT MOHANTY</div>` : `<div class="viewport-3d"><div class="reactor-core"></div></div><h1 style="font-size:5rem;text-shadow:0 0 50px ${n.color};">${n.name}</h1><a href="${n.link}" target="_blank" class="open-btn" style="border-color:${n.color};color:${n.color}" onclick="playSound(1000)">OPEN ${n.label}</a>`;
                v.innerHTML = `<a href="#" class="back-btn" onclick="navigate('home')">BACK</a><div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">${content}</div>`;
            }
        }
    </script>
</body>
</html>
