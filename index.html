<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKYRO V17 | SONIC FEEDBACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --bg: #000105; --red: #ff003c; --glow: 0 0 40px rgba(0, 242, 255, 0.7); --speed: 15; }
        body.nitro { --p: #ff003c; --glow: 0 0 60px rgba(255, 0, 60, 0.9); --speed: 60; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body, html { background: var(--bg); color: var(--p); font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; perspective: 2500px; transition: color 0.5s; }

        /* CREATOR POPUP */
        #creator-pop { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(50px); animation: fadeIn 0.5s; }
        .pop-card { border: 2px solid var(--p); padding: 50px; background: rgba(0,242,255,0.05); box-shadow: var(--glow); text-align: center; }
        .pop-text { font-size: 2.5rem; font-weight: 900; letter-spacing: 10px; line-height: 1.5; }

        /* HANDSHAKE */
        #handshake { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .hand-scanner { width: 200px; height: 200px; border: 4px solid #0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; animation: pulse 2s infinite; cursor: pointer; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: #0f0; top: 0; animation: scanLine 2s infinite ease-in-out; box-shadow: 0 0 25px #0f0; }

        /* UI WRAPPER */
        #ui-wrapper { position: relative; width: 100%; height: 100%; z-index: 10; display: none; opacity: 0; transition: 1.5s; }
        .glass { background: rgba(0, 5, 15, 0.8); border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(40px); border-radius: 20px; }

        #container { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 140px 1fr; height: 100vh; padding: 20px; gap: 20px; }
        header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .logo-text { font-size: 2.5rem; font-weight: 900; letter-spacing: 8px; text-shadow: var(--glow); }
        .tagline { font-size: 1rem; letter-spacing: 4px; opacity: 0.7; text-transform: uppercase; margin-top: 5px; }
        
        aside { display: flex; flex-direction: column; }
        #speedo-wrap { padding: 20px; text-align: center; border-bottom: 1px solid rgba(0,242,255,0.1); }
        .gauge-val { font-size: 3rem; font-weight: 900; text-shadow: var(--glow); }

        .nitro-btn { background: rgba(255,0,60,0.1); border: 1px solid var(--red); color: var(--red); padding: 15px; margin: 15px; font-weight: 900; font-size: 0.8rem; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
        .nitro-btn:hover { background: var(--red); color: #fff; box-shadow: 0 0 40px var(--red); }

        main { position: relative; overflow-y: auto; scrollbar-width: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; padding: 20px; transform-style: preserve-3d; }
        .card { padding: 40px; text-align: center; transition: 0.5s; transform-style: preserve-3d; background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 5px 30px; }
        .card:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--p); transform: translateZ(80px); box-shadow: var(--glow); }

        .back-btn { position: absolute; top: 25px; left: 25px; padding: 12px 40px; border: 2px solid var(--p); background: #000; color: var(--p); font-weight: 900; text-decoration: none; border-radius: 0 20px; box-shadow: var(--glow); z-index: 100; }
        .open-btn { display: inline-block; padding: 20px 60px; border: 3px solid var(--p); background: transparent; color: var(--p); text-decoration: none; font-weight: 900; letter-spacing: 5px; font-size: 1.2rem; border-radius: 0 40px; transition: 0.4s; box-shadow: var(--glow); }
        .open-btn:hover { background: var(--p); color: #000; transform: scale(1.1); box-shadow: 0 0 100px var(--p); }

        .viewport-3d { width: 350px; height: 350px; transform-style: preserve-3d; position: relative; margin-bottom: 30px; }
        .reactor { width: 100%; height: 100%; border-radius: 50%; border: 8px solid var(--p); animation: hyperSpin 4s linear infinite; box-shadow: var(--glow); position: absolute; }
        
        @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes hyperSpin { from { transform: rotateY(0) rotateX(60deg); } to { transform: rotateY(360deg) rotateX(60deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="initDrive()">

    <div id="handshake" onclick="boot()">
        <div class="hand-scanner"><div class="scan-line"></div></div>
        <div style="margin-top:20px; color:#0f0; letter-spacing:5px;">ARCHITECT: SHASWAT MOHANTY</div>
    </div>

    <div id="creator-pop" onclick="playClick(); this.style.display='none'">
        <div class="pop-card">
            <div class="pop-text">DESIGNED AND CREATED<br>BY<br>SHASWAT MOHANTY</div>
            <div style="margin-top:30px; opacity:0.6;">( CLICK TO CLOSE )</div>
        </div>
    </div>

    <canvas id="warp-canvas" style="position:fixed; inset:0; z-index:0;"></canvas>

    <div id="ui-wrapper">
        <div id="container">
            <header class="glass">
                <div class="branding">
                    <div class="logo-text">SKYRO | <span style="font-weight:300; opacity:0.6;">by Shaswat</span></div>
                    <div class="tagline">AppNexus : Your Digital Citadel</div>
                </div>
                <button class="nitro-btn" onclick="toggleNitro()">ENGAGE NITRO BOOST</button>
            </header>

            <aside class="glass">
                <div id="speedo-wrap">
                    <div class="gauge-val" id="speedo">000</div>
                    <div style="font-size:0.7rem; opacity:0.6; letter-spacing:3px;">MACH VELOCITY</div>
                </div>
                <div id="terminal" style="flex-grow:1; overflow-y:auto; padding:15px; font-family:'Source Code Pro'; font-size:0.7rem;"></div>
            </aside>

            <main class="glass" id="viewport"></main>
        </div>
    </div>

    <script>
        const nodes = [
            { id: 'mk3', name: 'MARK 3', icon: '🏎️', color: '#ff0000', link: 'https://youtube.com', label: 'YOUTUBE' },
            { id: 'mk4', name: 'MARK 4', icon: '🚀', color: '#00ff66', link: 'https://play.google.com', label: 'PLAY STORE' },
            { id: 'mk5', name: 'MARK 5', icon: '🏁', color: '#ffaa00', link: 'https://www.pubgmobile.com', label: 'PUBG MOBILE' },
            { id: 'mk50', name: 'MARK 50', icon: '📷', color: '#b300ff', link: 'https://www.instagram.com', label: 'INSTAGRAM' },
            { id: 'mk85', name: 'MARK 85', icon: '🛒', color: '#ffffff', link: 'https://www.flipkart.com', label: 'FLIPKART' },
            { id: 'mk1', name: 'MARK 1', icon: '📡', color: '#00f2ff', link: 'https://www.google.com/maps', label: 'GOOGLE MAPS' },
            { id: 'apex', name: 'APEX', icon: '⚡', color: '#00f2ff', link: '#', label: 'VOLUMETRIC' }
        ];

        let active = 'home', isNitro = false, speed = 0, targetSpeed = 0, audioCtx;

        /* SYNTHETIC CLICK ENGINE */
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playClick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(isNitro ? 1200 : 800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function speak(t) { try { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.pitch=0.8; window.speechSynthesis.speak(u); } catch(e){} }

        function boot() {
            initAudio();
            playClick();
            speak("Welcome to SKYRO by Shaswat. Sonic protocols active.");
            document.getElementById('handshake').style.display='none';
            document.getElementById('ui-wrapper').style.display='block';
            setTimeout(()=>document.getElementById('ui-wrapper').style.opacity='1', 100);
            render();
        }

        function initDrive() {
            canvas = document.getElementById('warp-canvas'); ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, z:Math.random()*canvas.width, len:Math.random()*40});
            draw();
            window.addEventListener('mousemove', (e) => {
                targetSpeed = Math.abs(e.movementX + e.movementY) * 2;
                if(active === 'home') {
                    const g = document.querySelector('.grid');
                    if(g) g.style.transform = `rotateY(${(window.innerWidth/2-e.clientX)/25}deg) rotateX(${-(window.innerHeight/2-e.clientY)/25}deg)`;
                }
            });
        }

        function toggleNitro() {
            playClick();
            isNitro = !isNitro;
            document.body.classList.toggle('nitro');
            if(isNitro) {
                speak("Nitro Boost engaged.");
                log("CRITICAL: HYPER-DRIVE OVERCLOCKING");
            }
        }

        let particles = [], canvas, ctx;
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            speed += (targetSpeed - speed) * 0.1;
            let mach = isNitro ? (speed + 200) : speed;
            document.getElementById('speedo').innerText = Math.floor(mach).toString().padStart(3, '0');
            targetSpeed *= 0.95;

            particles.forEach(p => {
                p.z -= (isNitro ? 40 : 10 + speed/5);
                if(p.z<=0) p.z=canvas.width;
                const px = (p.x - canvas.width/2) * (canvas.width/p.z) + canvas.width/2;
                const py = (p.y - canvas.height/2) * (canvas.width/p.z) + canvas.height/2;
                const s = (1 - p.z/canvas.width);
                ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--p');
                ctx.lineWidth = s * 4;
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + (s*p.len*(isNitro?10:2)), py); ctx.stroke();
            }); requestAnimationFrame(draw);
        }

        function log(m) {
            const t = document.getElementById('terminal'), d = document.createElement('div');
            d.className = 'log-ln'; d.innerHTML = `> ${m}`; t.prepend(d);
        }

        function navigate(id) { 
            playClick();
            if(id === 'apex') { 
                document.getElementById('creator-pop').style.display='flex'; 
                speak("Accessing creator credentials.");
            }
            active = id; render(); 
        }

        function render() {
            const v = document.getElementById('viewport');
            log(`SYNC_ACTIVE: ${active.toUpperCase()}`);
            if(active === 'home' || active === 'apex') {
                document.body.style.setProperty('--p', isNitro ? '#ff003c' : '#00f2ff');
                v.innerHTML = `<div class="grid">${nodes.map(n => `<div class="card" onclick="navigate('${n.id}')"><span style="font-size:4rem;display:block;margin-bottom:15px;color:${n.color}">${n.icon}</span><div style="font-size:1.4rem;font-weight:900;color:${n.color}">${n.name}</div><div style="font-size:0.7rem;opacity:0.6;margin-top:10px;">OPEN_${n.label}</div></div>`).join('')}</div>`;
            } else {
                const n = nodes.find(x => x.id === active);
                document.body.style.setProperty('--p', n.color);
                speak(`Opening ${n.label}.`);
                v.innerHTML = `<a href="#" class="back-btn" onclick="navigate('home')">BACK</a><div class="center-stage"><div class="viewport-3d"><div class="reactor"></div></div><h1 style="font-size:4.5rem;text-shadow:0 0 50px ${n.color};">${n.name}</h1><p style="letter-spacing:10px;margin-bottom:40px;opacity:0.8;">UPLINKING TO ${n.label}...</p><a href="${n.link}" target="_blank" class="open-btn" style="border-color:${n.color};color:${n.color}" onclick="playClick()">OPEN ${n.label}</a></div>`;
            }
        }
    </script>
</body>
</html>
