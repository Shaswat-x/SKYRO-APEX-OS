<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyro's | APEX V9.4 SONIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Source+Code+Pro:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #010409; --glow: 0 0 30px rgba(0, 242, 255, 0.6); }
        body.theme-skyro { --primary: #00ffff; --bg: #00050a; }
        body.theme-mk3 { --primary: #00f2ff; --bg: #000a12; }
        body.theme-mk5 { --primary: #ff0a2f; --bg: #0a0000; }
        body.theme-mk7 { --primary: #ff5500; --bg: #0a0400; }
        body.theme-mk42 { --primary: #ffaa00; --bg: #0a0800; }
        body.theme-mk50 { --primary: #b300ff; --bg: #05000a; }
        body.theme-mk85 { --primary: #ffffff; --bg: #000000; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { background: var(--bg); color: var(--primary); font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; perspective: 1200px; transition: background 0.5s; }

        /* BOOT & HUD */
        #handshake { position: fixed; width: 100%; height: 100%; background: #000; z-index: 30000; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; }
        .handshake-btn { font-family: 'Orbitron'; font-size: 2rem; color: #0f0; border: 2px solid #0f0; padding: 20px 40px; text-shadow: 0 0 15px #0f0; box-shadow: inset 0 0 20px #0f0, 0 0 20px #0f0; animation: pulseCore 2s infinite alternate; }
        #boot-screen { position: fixed; width: 100%; height: 100%; background: #000; z-index: 20000; display: none; align-items: center; justify-content: center; flex-direction: column; font-family: 'Source Code Pro'; color: #0f0; }
        .boot-bar { width: 600px; height: 2px; background: rgba(0,255,0,0.2); margin-top: 20px; }
        .boot-fill { height: 100%; background: #0f0; width: 0%; box-shadow: 0 0 20px #0f0; }
        #particle-engine { position: fixed; width: 100%; height: 100%; z-index: 0; pointer-events: none; mix-blend-mode: screen; }

        /* LAYOUT */
        #app { position: relative; z-index: 10; display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 80px 1fr; height: 100vh; padding: 20px; gap: 20px; opacity: 0; transition: opacity 1s; }
        header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding: 0 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }
        .logo { font-family: 'Orbitron'; font-size: 2.5rem; letter-spacing: 12px; text-shadow: var(--glow); font-weight: 900; }
        .terminal { background: rgba(0,0,0,0.8); border: 1px solid var(--primary); padding: 20px; display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        #log-stream { flex-grow: 1; overflow-y: auto; font-family: 'Source Code Pro'; font-size: 0.8rem; display: flex; flex-direction: column; gap: 10px; }
        .log-entry { border-left: 3px solid var(--primary); padding-left: 10px; animation: slideIn 0.2s; }
        main { border: 1px solid var(--primary); background: rgba(0,0,0,0.6); padding: 40px; position: relative; overflow-y: auto; backdrop-filter: blur(10px); }

        /* CARDS & BUTTONS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; perspective: 2000px; padding: 20px; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--primary); padding: 30px; cursor: pointer; transform-style: preserve-3d; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card:hover { transform: translateZ(50px) scale(1.05); background: rgba(0,0,0,0.9); box-shadow: 0 30px 60px rgba(0,0,0,0.9), var(--glow); }
        .card-title { font-family: 'Orbitron'; font-size: 2rem; margin: 15px 0; font-weight: 900; text-shadow: var(--glow); transform: translateZ(30px); }
        .btn { background: #000; border: 2px solid var(--primary); color: var(--primary); padding: 15px 40px; font-family: 'Orbitron'; cursor: pointer; transition: 0.2s; text-transform: uppercase; pointer-events: auto; font-weight: 900; margin-top:10px; }
        .btn:hover { background: var(--primary); color: #000; box-shadow: var(--glow); transform: scale(1.1); }
        .btn-yt { border-color: #ff0000; color: #ff0000; } .btn-ps { border-color: #00ffcc; color: #00ffcc; }

        /* DASHBOARD VIEWS */
        .dashboard-view { display: flex; width: 100%; height: 100%; position: relative; animation: bootUp 0.8s; }
        .center-stage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; transform-style: preserve-3d; z-index: 5; pointer-events: none; }
        .hud-panels { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .data-box { background: rgba(0,0,0,0.9); border: 2px solid var(--primary); padding: 30px; font-family: 'Source Code Pro'; font-size: 1.1rem; text-shadow: var(--glow); box-shadow: var(--glow); }

        /* 3D MODELS */
        .mk3-reactor { width: 100%; height: 100%; transform-style: preserve-3d; animation: spinXY 10s linear infinite; }
        .mk3-r { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 3px solid var(--primary); transform: translate(-50%, -50%); box-shadow: var(--glow); }
        .mk5-core { transform-style: preserve-3d; animation: spinY 10s linear infinite; width: 100%; height: 100%; position: absolute; }
        .mk5-s { position: absolute; width: 80px; height: 80px; background: rgba(255,10,47,0.1); border: 2px solid var(--primary); animation: explode 4s infinite alternate; }
        #mech-canvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; z-index: 20; }

        @keyframes pulseCore { 0% { transform: scale(0.9); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes spinXY { 100% { transform: rotate3d(1, 1, 1, 360deg); } }
        @keyframes explode { 0% { transform: translate(-50%, -50%) translateZ(0); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) translateZ(var(--dz)) rotateX(360deg); opacity: 0.2; } }
        @keyframes bootUp { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="handshake" onclick="startBoot()"><div class="handshake-btn">[ INITIATE NEURAL HANDSHAKE ]</div><div style="color:#0f0; margin-top:20px; font-family:'Source Code Pro';">VERIFYING BIOMETRICS...</div></div>
    <div id="boot-screen"><div style="font-size:2rem; letter-spacing:10px; color:#0f0;" id="boot-txt">ESTABLISHING SONIC UPLINK...</div><div class="boot-bar"><div class="boot-fill" id="b-fill"></div></div></div>
    
    <canvas id="particle-engine"></canvas>

    <div id="app">
        <header><div class="logo">SKYRO <span style="font-size: 1.2rem; opacity: 0.5;">// SONIC V9.4</span></div><div id="status-box" style="color:#0f0;">VOICE: STANDBY</div></header>
        <aside class="terminal"><div id="log-stream"></div></aside>
        <main id="router-view"></main>
    </div>

    <script>
        const suits = [
            { id: 'skyro', name: 'PROJECT: SKYRO', class: 'VOLUMETRIC', desc: '3D Particle Exoskeleton.' },
            { id: 'mk3', name: 'MARK III', class: 'MEDIA UPLINK', desc: 'YouTube Database Access.' },
            { id: 'mk5', name: 'MARK V', class: 'APP UPLINK', desc: 'Play Store Mainframe.' },
            { id: 'mk7', name: 'MARK VII', class: 'GYRO-LASER', desc: 'Targeting Array.' },
            { id: 'mk42', name: 'MARK XLII', class: 'SWARM', desc: 'Magnetic Shards.' },
            { id: 'mk50', name: 'MARK L', class: 'LIQUID', desc: 'Nanotech Morph.' },
            { id: 'mk85', name: 'MARK LXXXV', class: 'INFINITY', desc: 'Cosmic Folder.' }
        ];

        let activeRoute = 'home', sysInit = false;
        const canvas = document.getElementById('particle-engine'), ctx = canvas.getContext('2d');
        let mechParticles = [], mechAngle = 0;

        /* VOICE ENGINE V9.4 */
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); // Clear queue
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.85; 
            utterance.rate = 1.0;
            utterance.volume = 1.0;
            
            // Critical Fix: Force browser to honor the request
            window.speechSynthesis.speak(utterance);
            logAction(`AUDIO_OUT: "${text}"`);
        }

        function startBoot() {
            // First interaction: Unlock voice immediately
            speak("Welcome Skyro."); 
            
            document.getElementById('handshake').style.display = 'none';
            document.getElementById('boot-screen').style.display = 'flex';
            
            let w = 0;
            const bootInt = setInterval(() => {
                w += Math.random()*20; if(w>100) w=100;
                document.getElementById('b-fill').style.width = w+'%';
                if(w>=100) {
                    clearInterval(bootInt);
                    speak("Mainframe operational. Voice uplink stable.");
                    setTimeout(() => {
                        document.getElementById('boot-screen').style.display = 'none';
                        document.getElementById('app').style.opacity = '1';
                        initSystem();
                    }, 500);
                }
            }, 150);
        }

        function initSystem() {
            sysInit = true; resize();
            window.addEventListener('resize', resize);
            window.addEventListener('hashchange', handleRouting);
            handleRouting();
            logAction("SONIC CORE V9.4 ONLINE");
            document.getElementById('status-box').innerText = "VOICE: ACTIVE";
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

        function logAction(msg) {
            const s = document.getElementById('log-stream'), e = document.createElement('div');
            e.className = 'log-entry'; e.innerHTML = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
            s.prepend(e);
        }

        function navigate(path) { window.location.hash = path; }

        function handleRouting() {
            activeRoute = window.location.hash.replace('#', '') || 'home';
            const view = document.getElementById('router-view');
            
            if (activeRoute === 'home') {
                view.innerHTML = `<div class="grid">${suits.map(s => `<div class="card" onclick="navigate('${s.id}')"><div class="card-title">${s.name}</div><div>${s.class}</div></div>`).join('')}</div>`;
            } else {
                const suit = suits.find(s => s.id === activeRoute);
                speak(`Deploying ${suit.name}`);
                
                let h = '';
                if(activeRoute === 'mk3') h = `<div class="mk3-reactor"><div class="mk3-r" style="width:300px; height:300px;"></div><div class="mk3-r" style="width:150px; height:150px; border-style:dashed;"></div></div>`;
                else if(activeRoute === 'mk5') h = `<div class="mk5-core">${Array(15).fill(0).map(()=>`<div class="mk5-s" style="--dx:${(Math.random()-0.5)*400}px; --dy:${(Math.random()-0.5)*400}px; --dz:${(Math.random()-0.5)*400}px;"></div>`).join('')}</div>`;
                else h = `<div style="font-size:3rem; border:2px solid;">${suit.name} MODEL ACTIVE</div>`;

                let btns = `<button class="btn" onclick="navigate('home')">ARCHIVE</button>`;
                if(activeRoute === 'mk3') btns = `<button class="btn btn-yt" onclick="window.location.href='https://youtube.com'">OPEN YOUTUBE</button><br>` + btns;
                if(activeRoute === 'mk5') btns = `<button class="btn btn-ps" onclick="window.location.href='https://play.google.com'">OPEN PLAY STORE</button><br>` + btns;

                view.innerHTML = `<div class="dashboard-view"><div class="center-stage">${h}</div><div class="hud-panels"><div class="data-box"><h2>${suit.name}</h2></div><div class="data-box">${btns}</div></div></div>`;
            }
        }
    </script>
</body>
</html>
