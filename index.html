<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SKYRO V21 | TITANIUM CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --bg: #000105; --red: #ff003c; --glow: 0 0 50px rgba(0, 242, 255, 0.8); }
        body.nitro { --p: #ff003c; --glow: 0 0 80px rgba(255, 0, 60, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; -webkit-tap-highlight-color: transparent; }
        body, html { background: #000; color: var(--p); font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; perspective: 3000px; touch-action: manipulation; }

        /* HIGH-END LOADER */
        #loader { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .load-ring { width: 120px; height: 120px; border: 4px solid rgba(0, 242, 255, 0.1); border-top: 4px solid var(--p); border-radius: 50%; animation: spin 0.6s linear infinite; box-shadow: var(--glow); }

        #handshake { position: fixed; inset: 0; z-index: 90000; background: #000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .scanner { width: 220px; height: 220px; border: 5px double #0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 1.5s infinite; cursor: pointer; position: relative; }
        .scan-line { position: absolute; width: 100%; height: 5px; background: #0f0; top: 0; animation: scan 2s infinite ease-in-out; box-shadow: 0 0 30px #0f0; }

        #ui-wrapper { position: fixed; inset: 0; z-index: 80000; display: none; opacity: 0; transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .glass { background: rgba(0, 10, 25, 0.85); border: 1px solid rgba(0, 242, 255, 0.3); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px); border-radius: 20px; box-shadow: 0 0 80px rgba(0,0,0,1); }

        /* RESPONSIVE ENGINE */
        #container { display: grid; grid-template-columns: 350px 1fr; grid-template-rows: 150px 1fr; height: 100vh; padding: 25px; gap: 25px; }
        @media (max-width: 900px) {
            #container { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; padding: 15px; }
            aside { grid-row: 3; height: 180px; }
            .logo-text { font-size: 1.5rem !important; }
            .grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
            .card { padding: 20px !important; }
            .viewport-3d { width: 250px !important; height: 250px !important; }
        }

        header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .logo-text { font-size: 2.8rem; font-weight: 900; letter-spacing: 12px; text-shadow: var(--glow); }

        aside { display: flex; flex-direction: column; overflow: hidden; }
        #speedo-wrap { padding: 30px; text-align: center; border-bottom: 1px solid rgba(0,242,255,0.1); }
        .gauge-val { font-size: 3.5rem; font-weight: 900; text-shadow: var(--glow); }

        .nitro-btn { border: 2px solid var(--red); color: var(--red); padding: 12px 25px; font-weight: 900; background: transparent; cursor: pointer; letter-spacing: 3px; }

        main { position: relative; overflow-y: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 30px; transform-style: preserve-3d; }
        .card { padding: 45px; text-align: center; transition: 0.5s; transform-style: preserve-3d; background: rgba(0, 242, 255, 0.04); border: 2px solid rgba(0, 242, 255, 0.15); border-radius: 10px 40px; }
        .card:hover { border-color: var(--p); transform: translateZ(100px) rotateY(10deg); box-shadow: var(--glow); background: rgba(0, 242, 255, 0.1); }

        .back-btn { position: absolute; top: 30px; left: 30px; padding: 15px 45px; border: 3px solid var(--p); background: #000; color: var(--p); font-weight: 900; text-transform: uppercase; letter-spacing: 5px; box-shadow: var(--glow); z-index: 1000; text-decoration: none; }
        .open-btn { display: inline-block; padding: 25px 80px; border: 4px solid var(--p); background: transparent; color: var(--p); font-weight: 900; font-size: 1.4rem; letter-spacing: 8px; border-radius: 0 50px; transition: 0.3s; box-shadow: var(--glow); }

        .viewport-3d { width: 400px; height: 400px; transform-style: preserve-3d; position: relative; }
        .reactor-core { width: 100%; height: 100%; border-radius: 50%; border: 12px solid var(--p); animation: hyperSpin 4s linear infinite; box-shadow: var(--glow), inset var(--glow); position: absolute; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes hyperSpin { from { transform: rotateY(0) rotateX(70deg); } to { transform: rotateY(360deg) rotateX(70deg); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px #0f0; } 50% { box-shadow: 0 0 80px #0f0; transform: scale(1.03); } }
    </style>
</head>
<body onload="initSystem()">

    <div id="loader">
        <div class="load-ring"></div>
        <div style="margin-top:30px; font-family:'Source Code Pro'; letter-spacing:8px; font-size:0.7rem;">CALIBRATING CITADEL ASSETS...</div>
    </div>

    <div id="handshake" onclick="boot()">
        <div class="scanner"><div class="scan-line"></div></div>
        <div style="margin-top:40px; color:#0f0; font-size:1.2rem; letter-spacing:8px; font-weight:900; text-align:center;">ARCHITECT: SHASWAT MOHANTY</div>
    </div>

    <canvas id="nebula" style="position:fixed; inset:0; z-index:0;"></canvas>

    <div id="ui-wrapper">
        <div id="container">
            <header class="glass">
                <div class="branding">
                    <div class="logo-text">SKYRO | SHASWAT</div>
                    <div style="letter-spacing:6px; opacity:0.8; font-size:0.9rem;">APPNEXUS : YOUR DIGITAL CITADEL</div>
                </div>
                <button class="nitro-btn" onclick="toggleNitro()">NITRO</button>
            </header>
            <aside class="glass">
                <div id="speedo-wrap">
                    <div class="gauge-val" id="speedo">000</div>
                    <div style="letter-spacing:5px; opacity:0.6; font-size:0.7rem;">MACH VELOCITY</div>
                </div>
                <div id="terminal" style="flex-grow:1; overflow-y:auto; padding:20px; font-family:'Source Code Pro'; font-size:0.7rem; line-height:2;"></div>
            </aside>
            <main class="glass" id="viewport"></main>
        </div>
    </div>

    <script>
        const nodes = [
            { id: 'mk3', name: 'MARK 3', icon: '🏎️', color: '#ff0000', link: 'https://youtube.com', label: 'YOUTUBE' },
            { id: 'mk4', name: 'MARK 4', icon: '🚀', color: '#00ff66', link: 'https://play.google.com', label: 'PLAY STORE' },
            { id: 'mk5', name: 'MARK 5', icon: '🏁', color: '#ffaa00', link: 'https://www.pubgmobile.com', label: 'PUBG MOBILE' },
            { id: 'mk50', name: 'MARK 50', icon: '🌌', color: '#b300ff', link: 'https://instagram.com', label: 'INSTAGRAM' },
            { id: 'mk85', name: 'MARK 85', icon: '💎', color: '#ffffff', link: 'https://flipkart.com', label: 'FLIPKART' },
            { id: 'mk1', name: 'MARK 1', icon: '📡', color: '#00f2ff', link: 'https://maps.google.com', label: 'GOOGLE MAPS' },
            { id: 'apex', name: 'APEX', icon: '⚛', color: '#00f2ff', link: '#', label: 'CREATOR' }
        ];

        let active = 'home', isNitro = false, speed = 0, targetSpeed = 0, audioCtx;

        function playSound(f) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'square'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.04, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
        }

        function speak(t) { 
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); u.pitch = 0.8; u.rate = 1; 
            window.speechSynthesis.speak(u); 
        }

        function initSystem() {
            initSpace();
            setTimeout(() => { 
                document.getElementById('loader').style.display = 'none';
                document.getElementById('handshake').style.display = 'flex';
            }, 1200);
        }

        function boot() {
            playSound(600); speak("Welcome to SKYRO by Shaswat. Systems authorized.");
            document.getElementById('handshake').style.display='none';
            document.getElementById('ui-wrapper').style.display='block';
            setTimeout(()=>document.getElementById('ui-wrapper').style.opacity='1', 100);
            render();
        }

        function toggleNitro() {
            playSound(1000); isNitro = !isNitro; document.body.classList.toggle('nitro');
            if(isNitro) speak("Nitro engaged. Overclocking.");
        }

        let canvas, ctx, parts = [];
        function initSpace() {
            canvas = document.getElementById('nebula'); ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<250; i++) parts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, z:Math.random()*canvas.width, l:Math.random()*50});
            animate();
            window.addEventListener('mousemove', (e) => {
                targetSpeed = Math.abs(e.movementX + e.movementY) * 2;
                if(active === 'home') {
                    const g = document.querySelector('.grid');
                    if(g) g.style.transform = `rotateY(${(window.innerWidth/2-e.clientX)/25}deg) rotateX(${-(window.innerHeight/2-e.clientY)/25}deg)`;
                }
            });
        }

        function animate() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            speed += (targetSpeed - speed) * 0.1;
            let m = isNitro ? (speed + 400) : speed;
            document.getElementById('speedo').innerText = Math.floor(m).toString().padStart(3, '0');
            targetSpeed *= 0.95;
            parts.forEach(p => {
                p.z -= (isNitro ? 50 : 12 + speed/5); if(p.z<=0) p.z=canvas.width;
                const sx = (p.x - canvas.width/2) * (canvas.width/p.z) + canvas.width/2;
                const sy = (p.y - canvas.height/2) * (canvas.width/p.z) + canvas.height/2;
                const s = (1 - p.z/canvas.width);
                ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--p');
                ctx.lineWidth = s * 5; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + (s*p.l*(isNitro?15:3)), sy); ctx.stroke();
            }); requestAnimationFrame(animate);
        }

        function log(msg) {
            const t = document.getElementById('terminal'), d = document.createElement('div');
            d.innerHTML = `> ${msg}`; t.prepend(d);
        }

        function navigate(id) { playSound(800); active = id; render(); }

        function render() {
            const v = document.getElementById('viewport');
            log(`STARK_LINK: ${active.toUpperCase()}`);
            if(active === 'home') {
                v.innerHTML = `<div class="grid">${nodes.map(n => `<div class="card" onclick="navigate('${n.id}')"><span style="font-size:4.5rem;display:block;margin-bottom:20px;color:${n.color}">${n.icon}</span><div style="font-size:1.8rem;font-weight:900;color:${n.color}">${n.name}</div><div style="font-size:0.8rem;opacity:0.6;margin-top:10px;font-family:'Source Code Pro';">${n.label}</div></div>`).join('')}</div>`;
            } else {
                const n = nodes.find(x => x.id === active);
                speak(`Opening ${n.label}.`);
                let content = active === 'apex' ? `<div style="font-size:3rem;font-weight:900;text-align:center;line-height:1.5;">DESIGNED AND CREATED<br>BY<br>SHASWAT MOHANTY</div>` : `<div class="viewport-3d"><div class="reactor-core"></div></div><h1 style="font-size:5rem;text-shadow:0 0 50px ${n.color};">${n.name}</h1><a href="${n.link}" target="_blank" class="open-btn" style="border-color:${n.color};color:${n.color}">OPEN ${n.label}</a>`;
                v.innerHTML = `<a href="#" class="back-btn" onclick="navigate('home')">BACK</a><div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">${content}</div>`;
            }
        }
    </script>
</body>
</html>
